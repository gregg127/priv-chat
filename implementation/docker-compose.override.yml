version: '3.9'

# Local development overrides
# Usage: docker compose up  (automatically merges with docker-compose.yml)
# Note: Java services run pre-built JARs — source volume mounts have no effect.
#       Rebuild with: docker compose up --build

services:
  entry-auth-service:
    environment:
      SPRING_PROFILES_ACTIVE: dev

  api-gateway:
    environment:
      SPRING_PROFILES_ACTIVE: dev

  # Expose rooms-service WS port directly so the browser can connect without
  # going through the gateway. NEXT_PUBLIC_WS_URL below points at this port.
  rooms-service:
    ports:
      - "8081:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* vars must be embedded at Docker build time, not runtime.
        # This bakes ws://localhost:8081/ws into the frontend bundle for local dev.
        NEXT_PUBLIC_WS_URL: "ws://localhost:8081/ws"
    environment:
      NODE_ENV: development
      # Kept here as a fallback for `next dev` mode (reads env at startup).
      NEXT_PUBLIC_WS_URL: "ws://localhost:8081/ws"
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
