cors:
  # Comma-separated allowed WebSocket/HTTP origins. Override via CORS_ALLOWED_ORIGINS env var.
  # Use a comma-separated list for multiple: http://localhost:3000,https://app.example.com
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
logging:
  level:
    root: INFO
    org.flywaydb: DEBUG
    com.privchat.rooms: DEBUG
    org.springframework.web.servlet.DispatcherServlet: DEBUG
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres-rooms:5432/rooms}
    username: ${SPRING_DATASOURCE_USERNAME:rooms}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: false
server:
  port: 8080
  tomcat:
    accesslog:
      enabled: true
      pattern: "%t \"%r\" %s %b %D ms"
entry-auth-service:
  url: ${ENTRY_AUTH_SERVICE_URL:http://entry-auth-service:8080}
jwt:
  expiry-seconds: ${JWT_EXPIRY_SECONDS:900}
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
